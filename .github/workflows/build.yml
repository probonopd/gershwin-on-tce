name: Build Gershwin TCE Extension

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build gershwin.tcz (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: debian:oldstable
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y git tree squashfs-tools file

      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone gershwin-developer
        run: |
          git clone --depth 1 https://github.com/gershwin-desktop/gershwin-developer.git /tmp/gershwin-developer

      - name: Install build dependencies
        working-directory: /tmp/gershwin-developer
        run: |
          ./Library/Scripts/Bootstrap.sh

      - name: Checkout source repositories
        working-directory: /tmp/gershwin-developer
        run: |
          PINNED=1 ./Library/Scripts/Checkout.sh

      - name: Build Gershwin Desktop
        working-directory: /tmp/gershwin-developer
        run: |
          make install

      - name: Package as TCE extension
        run: |
          mkdir -p artifacts

          # Create .tcz (SquashFS with XZ compression)
          mksquashfs /System artifacts/gershwin.tcz -comp xz -b 1M -noappend

          # Generate file list
          unsquashfs -l artifacts/gershwin.tcz | \
              grep -v "^squashfs-root$" | \
              sed 's|^squashfs-root||' | \
              sort > artifacts/gershwin.tcz.list

          # Generate MD5 checksum
          cd artifacts
          md5sum gershwin.tcz > gershwin.tcz.md5.txt

          # Generate metadata
          TIMESTAMP=$(date +%Y/%m/%d)
          SIZE=$(du -h gershwin.tcz | cut -f1)
          cat > gershwin.tcz.info << INFOEOF
          Title:          gershwin.tcz
          Description:    Gershwin Desktop Environment based on GNUstep
          Version:        $(date +%Y%m%d)
          Author:         Gershwin Desktop Project
          Original-site:  https://github.com/gershwin-desktop
          Copying-policy: MIT
          Size:           ${SIZE}
          Extension_by:   gershwin-on-tce
          Tags:           DESKTOP GNUSTEP WINDOWMANAGER GUI
          Comments:       Complete Gershwin Desktop built from gershwin-developer.
                          Architecture: ${{ matrix.arch }}
                          Built on Debian oldstable (glibc 2.36) for TCE 15.x compatibility.
                          Start with: startx /System/Library/Scripts/Gershwin.sh
          Change-log:     ${TIMESTAMP} Initial build
          Current:        ${TIMESTAMP}
          INFOEOF

      # TCE 15.x x86_64: all package names verified against repo
      - name: Generate runtime dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          cat > artifacts/gershwin.tcz.dep << 'EOF'
          Xorg-7.7-lib.tcz
          libX11.tcz
          libXext.tcz
          libXrender.tcz
          cairo.tcz
          libpng.tcz
          libtiff.tcz
          libjpeg-turbo.tcz
          libxml2.tcz
          libxslt.tcz
          gnutls38.tcz
          libffi.tcz
          icu74.tcz
          giflib7.tcz
          libao.tcz
          portaudio.tcz
          dbus.tcz
          cups.tcz
          libxcb.tcz
          libXft.tcz
          libXrandr.tcz
          libXcomposite.tcz
          libXt.tcz
          avahi.tcz
          imagemagick.tcz
          freeglut.tcz
          EOF

      # TCE 15.x aarch64 (piCore64): package names verified against repo
      # Note: libao, imagemagick, freeglut are not available for aarch64
      - name: Generate runtime dependencies (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          cat > artifacts/gershwin.tcz.dep << 'EOF'
          libX11.tcz
          libXext.tcz
          libXrender.tcz
          cairo.tcz
          libpng.tcz
          libtiff.tcz
          libjpeg-turbo.tcz
          libxml2.tcz
          libxslt.tcz
          gnutls.tcz
          libffi7.tcz
          icu73.tcz
          giflib.tcz
          portaudio.tcz
          dbus.tcz
          cups.tcz
          libxcb.tcz
          libXft.tcz
          libXrandr.tcz
          libXcomposite.tcz
          libXt.tcz
          avahi.tcz
          EOF

      - name: List build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh artifacts/
          echo ""
          echo "=== TCZ file list (first 50 entries) ==="
          head -50 artifacts/gershwin.tcz.list
          echo ""
          echo "=== TCZ info ==="
          cat artifacts/gershwin.tcz.info
          echo ""
          echo "=== TCZ deps ==="
          cat artifacts/gershwin.tcz.dep
          echo ""
          echo "=== MD5 ==="
          cat artifacts/gershwin.tcz.md5.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gershwin-tcz-${{ matrix.arch }}
          path: artifacts/
