name: Build Gershwin on Tiny Core Linux 16.x

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
            tce_arch: x86_64
            rootfs_cache_path: /tmp/corepure64.gz
            rootfs_cache_key: tce-16.x-corepure64
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
            tce_arch: aarch64
            rootfs_cache_path: /tmp/picore64.img.gz
            rootfs_cache_key: tce-16.x-picore64-img

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cache TCE package downloads
        uses: actions/cache@v4
        with:
          path: /tmp/tce-cache
          key: tce-16.x-pkgs-${{ matrix.tce_arch }}-${{ hashFiles('build.sh') }}
          restore-keys: |
            tce-16.x-pkgs-${{ matrix.tce_arch }}-

      - name: Cache TCE root filesystem
        uses: actions/cache@v4
        with:
          path: ${{ matrix.rootfs_cache_path }}
          key: ${{ matrix.rootfs_cache_key }}

      - name: Build Gershwin in TCE 16.x chroot
        run: |
          chmod +x build.sh
          sudo TCE_ARCH="${{ matrix.tce_arch }}" \
               BUILD_DIR="$GITHUB_WORKSPACE" \
               CACHE_DIR=/tmp/tce-cache \
               CHROOT_DIR=/tmp/tce-chroot \
               ./build.sh

      - name: Upload gershwin-system.tcz
        uses: actions/upload-artifact@v4
        with:
          name: gershwin-system-tce-${{ matrix.arch }}
          path: |
            gershwin-system.tcz
            gershwin-system.tcz.md5.txt
            gershwin-system.tcz.list
            gershwin-system.tcz.info
            gershwin-system.tcz.dep
          if-no-files-found: error
